<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Decryption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(7,18,40,0.78), rgba(10,25,55,0.82)),
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
            text-align: center;
        }

        h1 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 17px;
            color: #dce7ff;
            margin-bottom: 28px;
        }

        input[type="file"] {
            width: 320px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.95);
            color: #111;
            font-size: 15px;
            margin-bottom: 15px;
        }

        button {
            padding: 13px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
        }

        .message {
            margin: 20px auto;
            padding: 14px;
            border-radius: 12px;
            background: rgba(0,255,180,0.14);
            max-width: 700px;
        }

        .image-card {
            margin-top: 30px;
            background: rgba(255,255,255,0.10);
            padding: 22px;
            border-radius: 18px;
        }

        .image-card img {
            max-width: 100%;
            width: 500px;
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Secure Image Decryption</h1>
        <p class="subtitle">Upload your .npy file to recover the original image</p>

        <form action="/decrypt" method="post" enctype="multipart/form-data">
            <input type="file" name="keyfile" accept=".npy" required>
            <br>
            <button type="submit">Decrypt Image</button>
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        {% if decrypted_image %}
            <div class="image-card">
                <h2>Decrypted Image</h2>
                <img src="data:image/png;base64,{{ decrypted_image }}" alt="Decrypted Image">
            </div>
        {% endif %}
    </div>
</body>
</html>
